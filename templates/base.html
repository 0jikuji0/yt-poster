<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}yt-poster{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('dashboard') }}">▶ yt-poster</a>
    {% if session.get('logged_in') %}
      <nav><a href="{{ url_for('dashboard') }}">Tableau de bord</a>
           <a href="{{ url_for('library') }}">Bibliothèque</a>
           <a href="{{ url_for('logout') }}">Déconnexion</a></nav>
    {% endif %}
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
